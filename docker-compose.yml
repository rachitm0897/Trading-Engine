name: finflock-trading-engine
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_engine}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_engine}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    ports:
    - "${POSTGRES_PORT:-5433}:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks: [private]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.0
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    volumes:
      - ./streaming/kafka/create-topics.sh:/create-topics.sh:ro
    networks: [private]
    depends_on:
      kafka: {condition: service_healthy}
    restart: "no"

  flink-jobmanager:
    build: ./streaming/flink
    command: jobmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTO_SUBMIT_FLINK_JOBS: "true"
      MARKET_PRICE_STALE_SECONDS: ${MARKET_PRICE_STALE_SECONDS:-300}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        restart-strategy.type: exponential-delay
        restart-strategy.exponential-delay.initial-backoff: 1 s
        restart-strategy.exponential-delay.max-backoff: 60 s
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [private]
    depends_on:
      kafka-init: {condition: service_completed_successfully}
    restart: unless-stopped

  flink-taskmanager:
    build: ./streaming/flink
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        restart-strategy.type: exponential-delay
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [private]
    depends_on:
      flink-jobmanager: {condition: service_started}
    restart: unless-stopped

  backend:
    build: ./Backend
    environment:
      PORT: 8000
      APP_BASE_PATH: ${BACKEND_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-backend-local-insecure}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading-local-only}@postgres:5432/${POSTGRES_DB:-trading_engine}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      FLINK_REST_URL: http://flink-jobmanager:8081
      NEW_EXECUTION_MODE: ${NEW_EXECUTION_MODE:-SHADOW}
      BROKER_SESSION_ENCRYPTION_KEY: ${BROKER_SESSION_ENCRYPTION_KEY:-local-session-encryption-key-change-me}
      BROKER_CREDENTIAL_TTL_SECONDS: ${BROKER_CREDENTIAL_TTL_SECONDS:-900}
      BROKER_SESSION_CREATING_STALE_SECONDS: ${BROKER_SESSION_CREATING_STALE_SECONDS:-60}
      BROKER_SESSION_START_TIMEOUT_SECONDS: ${BROKER_SESSION_START_TIMEOUT_SECONDS:-45}
      BROKER_SESSION_HEALTH_TIMEOUT_SECONDS: ${BROKER_SESSION_HEALTH_TIMEOUT_SECONDS:-5}
      NOVNC_ACCESS_TOKEN_TTL_SECONDS: ${NOVNC_ACCESS_TOKEN_TTL_SECONDS:-300}
      NOVNC_PROXY_CONNECT_TIMEOUT_SECONDS: ${NOVNC_PROXY_CONNECT_TIMEOUT_SECONDS:-10}
      NOVNC_PROXY_IDLE_TIMEOUT_SECONDS: ${NOVNC_PROXY_IDLE_TIMEOUT_SECONDS:-300}
      NOVNC_PROXY_MAX_BODY_BYTES: ${NOVNC_PROXY_MAX_BODY_BYTES:-10485760}
      QCH_APP_ID: ${QCH_APP_ID:-}
      QCH_API_HOST: ${QCH_API_HOST:-}
      QCH_SERVICE_TOKEN: ${QCH_SERVICE_TOKEN:-}
      QCH_REQUEST_TIMEOUT_SECONDS: ${QCH_REQUEST_TIMEOUT_SECONDS:-10}
      QCH_SUBCONTAINER_NETWORK: ${QCH_SUBCONTAINER_NETWORK:-}
      IBKR_GATEWAY_IMAGE: ${IBKR_GATEWAY_IMAGE:-}
      ALLOW_LIVE_TRADING: "false"
      WARMUP_TIMEOUT_SECONDS: ${WARMUP_TIMEOUT_SECONDS:-300}
      MARKET_CONSUMER_HEARTBEAT_STALE_SECONDS: ${MARKET_CONSUMER_HEARTBEAT_STALE_SECONDS:-30}
      KAFKA_LAG_DEGRADED_THRESHOLD: ${KAFKA_LAG_DEGRADED_THRESHOLD:-1000}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FINNHUB_BASE_URL: ${FINNHUB_BASE_URL:-https://finnhub.io/api/v1}
      FINNHUB_API_KEY_OVERRIDE_ENABLED: ${FINNHUB_API_KEY_OVERRIDE_ENABLED:-false}
      FINNHUB_REQUEST_TIMEOUT_SECONDS: ${FINNHUB_REQUEST_TIMEOUT_SECONDS:-15}
      FINNHUB_MAX_RETRIES: ${FINNHUB_MAX_RETRIES:-2}
      FINNHUB_ENCRYPTION_KEY: ${FINNHUB_ENCRYPTION_KEY:-}
      FINNHUB_OPERATION_THROTTLE_LIMIT: ${FINNHUB_OPERATION_THROTTLE_LIMIT:-30}
      MARKET_DATA_FALLBACK_ENABLED: ${MARKET_DATA_FALLBACK_ENABLED:-false}
      FINNHUB_HISTORICAL_FALLBACK_ENABLED: ${FINNHUB_HISTORICAL_FALLBACK_ENABLED:-false}
      FINNHUB_LIVE_FALLBACK_ENABLED: ${FINNHUB_LIVE_FALLBACK_ENABLED:-false}
      FINNHUB_AUTO_FAILBACK_ENABLED: ${FINNHUB_AUTO_FAILBACK_ENABLED:-false}
      IBKR_MARKET_DATA_FAILOVER_GRACE_SECONDS: ${IBKR_MARKET_DATA_FAILOVER_GRACE_SECONDS:-15}
      FINNHUB_LIVE_STALE_SECONDS: ${FINNHUB_LIVE_STALE_SECONDS:-15}
      FINNHUB_WS_URL: ${FINNHUB_WS_URL:-wss://ws.finnhub.io}
      FINNHUB_WS_RECONNECT_MAX_SECONDS: ${FINNHUB_WS_RECONNECT_MAX_SECONDS:-30}
      FINNHUB_ALLOWED_LATENESS_SECONDS: ${FINNHUB_ALLOWED_LATENESS_SECONDS:-2}
      FINNHUB_WS_RECONCILE_SECONDS: ${FINNHUB_WS_RECONCILE_SECONDS:-2}
      PRIMARY_RECOVERY_CONFIRMATION_EVENTS: ${PRIMARY_RECOVERY_CONFIRMATION_EVENTS:-3}
      PRIMARY_PROBE_RETRY_SECONDS: ${PRIMARY_PROBE_RETRY_SECONDS:-30}
      FINNHUB_MAPPING_REVALIDATE_SECONDS: ${FINNHUB_MAPPING_REVALIDATE_SECONDS:-86400}
      FINNHUB_SUPPORTED_ASSET_CLASSES: ${FINNHUB_SUPPORTED_ASSET_CLASSES:-STK}
      OPTIMIZATION_THROTTLE_LIMIT: ${OPTIMIZATION_THROTTLE_LIMIT:-30}
      EXPENSIVE_OPERATION_THROTTLE_WINDOW_SECONDS: ${EXPENSIVE_OPERATION_THROTTLE_WINDOW_SECONDS:-60}
      RESEARCH_ENABLED: ${RESEARCH_ENABLED:-true}
      RECOMMENDATION_SYSTEM_ENABLED: ${RECOMMENDATION_SYSTEM_ENABLED:-true}
      RECOMMENDATION_UNIVERSE_KEY: ${RECOMMENDATION_UNIVERSE_KEY:-US_LARGE_CAP_GICS}
      RECOMMENDATION_MAX_STOCKS: ${RECOMMENDATION_MAX_STOCKS:-20}
      RECOMMENDATION_MIN_STOCKS: ${RECOMMENDATION_MIN_STOCKS:-5}
      RECOMMENDATION_CANDIDATE_POOL_SIZE: ${RECOMMENDATION_CANDIDATE_POOL_SIZE:-100}
      RECOMMENDATION_MAX_STRATEGIES_PER_STOCK: ${RECOMMENDATION_MAX_STRATEGIES_PER_STOCK:-1}
      RESEARCH_BUNDLE_PATH: /app/research_bundle
      RESEARCH_ARTIFACT_ROOT: /app/research_artifacts
      RESEARCH_DAILY_LOOKBACK_YEARS: ${RESEARCH_DAILY_LOOKBACK_YEARS:-10}
      RESEARCH_INTRADAY_LOOKBACK_DAYS: ${RESEARCH_INTRADAY_LOOKBACK_DAYS:-90}
      RESEARCH_MINIMUM_DAILY_BARS: ${RESEARCH_MINIMUM_DAILY_BARS:-756}
      RESEARCH_MAX_PARALLEL_DATA_TASKS: ${RESEARCH_MAX_PARALLEL_DATA_TASKS:-8}
      RESEARCH_MAX_PARALLEL_BACKTEST_TASKS: ${RESEARCH_MAX_PARALLEL_BACKTEST_TASKS:-8}
      RESEARCH_DAILY_PROVIDER: ${RESEARCH_DAILY_PROVIDER:-FINNHUB}
      RESEARCH_SCORE_MAX_AGE_DAYS: ${RESEARCH_SCORE_MAX_AGE_DAYS:-7}
      RESEARCH_STALE_SCORE_FALLBACK_DAYS: ${RESEARCH_STALE_SCORE_FALLBACK_DAYS:-30}
      RECOMMENDATION_SNAPSHOT_MAX_AGE_HOURS: ${RECOMMENDATION_SNAPSHOT_MAX_AGE_HOURS:-24}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks: [private]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
    environment:
      PORT: 5173
      BACKEND_API_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks: [private]
    depends_on:
      backend: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

networks:
  private:
    internal: false

volumes:
  postgres_data:
  kafka_data:
  flink_checkpoints:
  flink_savepoints:
