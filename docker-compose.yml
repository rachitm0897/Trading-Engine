name: finflock-trading-engine
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_engine}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_engine}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks: [private]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ib_gateway:
    build: ./IB_gateway
    environment:
      PORT: 8080
      APP_BASE_PATH: ${GATEWAY_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${GATEWAY_PUBLIC_BASE_URL:-http://localhost:${GATEWAY_PORT:-8080}}
      DJANGO_SECRET_KEY: ${GATEWAY_DJANGO_SECRET_KEY:-gateway-local-insecure}
      GATEWAY_SERVICE_TOKEN: ${GATEWAY_SERVICE_TOKEN:-local-service-token}
      NOVNC_PASSWORD: ${NOVNC_PASSWORD:-local-vnc-password}
      IB_USERNAME: ${IB_USERNAME:-}
      IB_PASSWORD: ${IB_PASSWORD:-}
      IBC_TRADING_MODE: ${IBC_TRADING_MODE:-paper}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-17}
      BROKER_ADAPTER: ${BROKER_ADAPTER:-mock}
    volumes:
      - gateway_settings:/home/ibgateway/Jts
      - gateway_events:/data
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks: [private]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  backend:
    build: ./Backend
    environment:
      PORT: 8000
      APP_BASE_PATH: ${BACKEND_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-backend-local-insecure}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading-local-only}@postgres:5432/${POSTGRES_DB:-trading_engine}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      IB_GATEWAY_SERVICE_URL: http://ib_gateway:8080/api/v1
      GATEWAY_SERVICE_TOKEN: ${GATEWAY_SERVICE_TOKEN:-local-service-token}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      BOOTSTRAP_DEMO_DATA: ${BOOTSTRAP_DEMO_DATA:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks: [private]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      ib_gateway: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}/api/v1}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
    environment:
      PORT: 5173
      APP_BASE_PATH: ${FRONTEND_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:-http://localhost:${FRONTEND_PORT:-5173}}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks: [private]
    depends_on:
      backend: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

networks:
  private:
    internal: false

volumes:
  postgres_data:
  gateway_settings:
  gateway_events:
