name: finflock-trading-engine
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_engine}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_engine}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks: [private]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.0
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    volumes:
      - ./streaming/kafka/create-topics.sh:/create-topics.sh:ro
    networks: [private]
    depends_on:
      kafka: {condition: service_healthy}
    restart: "no"

  flink-jobmanager:
    build: ./streaming/flink
    command: jobmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTO_SUBMIT_FLINK_JOBS: "true"
      MARKET_PRICE_STALE_SECONDS: ${MARKET_PRICE_STALE_SECONDS:-300}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        restart-strategy.type: exponential-delay
        restart-strategy.exponential-delay.initial-backoff: 1 s
        restart-strategy.exponential-delay.max-backoff: 60 s
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [private]
    depends_on:
      kafka-init: {condition: service_completed_successfully}
    restart: unless-stopped

  flink-taskmanager:
    build: ./streaming/flink
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        restart-strategy.type: exponential-delay
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [private]
    depends_on:
      flink-jobmanager: {condition: service_started}
    restart: unless-stopped

networks:
  private:
    internal: false

volumes:
  postgres_data:
  kafka_data:
  flink_checkpoints:
  flink_savepoints:
