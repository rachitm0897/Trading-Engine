name: finflock-trading-engine
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_engine}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_engine}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    ports:
    - "${POSTGRES_PORT:-5433}:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks: [private]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.0
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    volumes:
      - ./streaming/kafka/create-topics.sh:/create-topics.sh:ro
    networks: [private]
    depends_on:
      kafka: {condition: service_healthy}
    restart: "no"

  flink-jobmanager:
    build: ./streaming/flink
    command: jobmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTO_SUBMIT_FLINK_JOBS: "true"
      MARKET_PRICE_STALE_SECONDS: ${MARKET_PRICE_STALE_SECONDS:-300}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        restart-strategy.type: exponential-delay
        restart-strategy.exponential-delay.initial-backoff: 1 s
        restart-strategy.exponential-delay.max-backoff: 60 s
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [private]
    depends_on:
      kafka-init: {condition: service_completed_successfully}
    restart: unless-stopped

  flink-taskmanager:
    build: ./streaming/flink
    command: taskmanager
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        restart-strategy.type: exponential-delay
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [private]
    depends_on:
      flink-jobmanager: {condition: service_started}
    restart: unless-stopped

  ib_gateway:
    build: ./IB_gateway
    environment:
      PORT: 8080
      APP_BASE_PATH: ${GATEWAY_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${GATEWAY_PUBLIC_BASE_URL:-http://localhost:${GATEWAY_PORT:-8080}}
      DJANGO_SECRET_KEY: ${GATEWAY_DJANGO_SECRET_KEY:-gateway-local-insecure}
      GATEWAY_SERVICE_TOKEN: ${GATEWAY_SERVICE_TOKEN:-local-service-token}
      NOVNC_PASSWORD: ${NOVNC_PASSWORD:-local-vnc-password}
      IB_USERNAME: ${IB_USERNAME:-}
      IB_PASSWORD: ${IB_PASSWORD:-}
      IBC_TRADING_MODE: ${IBC_TRADING_MODE:-paper}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-17}
      BROKER_ADAPTER: ${BROKER_ADAPTER:-ib_async}
      BROKER_REFRESH_SECONDS: ${BROKER_REFRESH_SECONDS:-5}
      GATEWAY_DB_PATH: /data/gateway.sqlite3
      TWS_MAJOR_VRSN: ${TWS_MAJOR_VRSN:-1045}
    volumes:
      - gateway_settings:/home/ibgateway/Jts
      - gateway_events:/data
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks: [private]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    environment:
      PORT: 8000
      APP_BASE_PATH: ${BACKEND_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-backend-local-insecure}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading-local-only}@postgres:5432/${POSTGRES_DB:-trading_engine}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      FLINK_REST_URL: http://flink-jobmanager:8081
      NEW_EXECUTION_MODE: ${NEW_EXECUTION_MODE:-SHADOW}
      IB_GATEWAY_SERVICE_URL: http://ib_gateway:8080/api/v1
      GATEWAY_SERVICE_TOKEN: ${GATEWAY_SERVICE_TOKEN:-local-service-token}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      WARMUP_TIMEOUT_SECONDS: ${WARMUP_TIMEOUT_SECONDS:-300}
      MARKET_CONSUMER_HEARTBEAT_STALE_SECONDS: ${MARKET_CONSUMER_HEARTBEAT_STALE_SECONDS:-30}
      KAFKA_LAG_DEGRADED_THRESHOLD: ${KAFKA_LAG_DEGRADED_THRESHOLD:-1000}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FINNHUB_BASE_URL: ${FINNHUB_BASE_URL:-https://finnhub.io/api/v1}
      FINNHUB_API_KEY_OVERRIDE_ENABLED: ${FINNHUB_API_KEY_OVERRIDE_ENABLED:-false}
      FINNHUB_REQUEST_TIMEOUT_SECONDS: ${FINNHUB_REQUEST_TIMEOUT_SECONDS:-15}
      FINNHUB_MAX_RETRIES: ${FINNHUB_MAX_RETRIES:-2}
      FINNHUB_ENCRYPTION_KEY: ${FINNHUB_ENCRYPTION_KEY:-}
      FINNHUB_OPERATION_THROTTLE_LIMIT: ${FINNHUB_OPERATION_THROTTLE_LIMIT:-30}
      OPTIMIZATION_THROTTLE_LIMIT: ${OPTIMIZATION_THROTTLE_LIMIT:-30}
      EXPENSIVE_OPERATION_THROTTLE_WINDOW_SECONDS: ${EXPENSIVE_OPERATION_THROTTLE_WINDOW_SECONDS:-60}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks: [private]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
      ib_gateway: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
        VITE_GATEWAY_PUBLIC_URL: ${VITE_GATEWAY_PUBLIC_URL:-http://localhost:${GATEWAY_PORT:-8080}}
    environment:
      PORT: 5173
      BACKEND_INTERNAL_URL: http://backend:8000
      APP_BASE_PATH: ${FRONTEND_APP_BASE_PATH:-}
      PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:-http://localhost:${FRONTEND_PORT:-5173}}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks: [private]
    depends_on:
      backend: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

networks:
  private:
    internal: false

volumes:
  postgres_data:
  kafka_data:
  flink_checkpoints:
  flink_savepoints:
  gateway_settings:
  gateway_events:
