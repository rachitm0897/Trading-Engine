name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py check --settings=config.test_settings
      - run: python manage.py makemigrations --check --dry-run --settings=config.test_settings
      - run: pytest -q
      - run: docker build -t trading-engine-backend .
