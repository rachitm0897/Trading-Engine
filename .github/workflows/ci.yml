name: Infrastructure CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  gateway-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: IB_gateway/requirements.txt
      - run: pip install -r IB_gateway/requirements.txt
      - run: python -m pytest -q IB_gateway/tests

  flink-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: streaming/flink/requirements.txt
      - run: pip install -r streaming/flink/requirements.txt
      - run: python -m pytest -q streaming/flink/tests

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --platform linux/amd64 -t trading-engine-gateway ./IB_gateway
      - run: docker build -t trading-engine-flink ./streaming/flink
